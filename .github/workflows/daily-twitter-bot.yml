name: Daily Twitter Bot

on:
  schedule:
    # Run daily at 9:00 AM UTC
    - cron: '0 9 * * *'
  
  # Allow manual triggering from Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate but do not post)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright browser
        run: |
          python -m playwright install chromium --with-deps
      
      - name: Run bot
        env:
          # AI Configuration
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AI_PROVIDER: groq
          GROQ_MODEL: llama-3.3-70b-versatile
          
          # X (Twitter) Authentication - using cookies
          TWIKIT_COOKIES: ${{ secrets.TWIKIT_COOKIES }}
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_EMAIL: ${{ secrets.X_EMAIL }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
          
          # Telegram Alerts (optional)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          
          # Workflow Options
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
        
        run: |
          python bot.py
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: logs/
          retention-days: 7
