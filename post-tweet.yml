name: Daily Twitter Bot

# =============================================================================
# 8 posts/day at IST times (IST = UTC + 5:30)
# 09:00 IST = 03:30 UTC, 12:00 IST = 06:30 UTC, etc.
# =============================================================================
on:
  schedule:
    - cron: '30 3 * * *'    # 09:00 IST
    - cron: '30 6 * * *'    # 12:00 IST
    - cron: '30 9 * * *'    # 15:00 IST
    - cron: '30 12 * * *'   # 18:00 IST
    - cron: '30 15 * * *'   # 21:00 IST
    - cron: '30 18 * * *'   # 00:00 IST
    - cron: '30 21 * * *'   # 03:00 IST
    - cron: '30 0 * * *'    # 06:00 IST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate but do not post)'
        required: false
        type: boolean
        default: false

concurrency:
  group: twitter-bot-single-instance
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser (Chromium)
        run: playwright install chromium --with-deps

      - name: Run bot
        env:
          # AI provider (use Groq — more reliable than OpenRouter free tier)
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          AI_PROVIDER: 'groq'
          # OpenRouter (fallback if Groq fails)
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'openai/gpt-oss-120b:free' }}
          # X cookies (contents of cookies.json)
          TWIKIT_COOKIES: ${{ secrets.TWIKIT_COOKIES }}
          # Telegram alerts
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Mode — default to REAL posting (not dry run)
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
        run: python bot.py

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: |
            logs/
            *.png
          retention-days: 14

      - name: Commit state file
        if: success()
        run: |
          git config --global user.name "twitter-bot[bot]"
          git config --global user.email "bot@users.noreply.github.com"
          git add logs/state.json || true
          git diff --staged --quiet || git commit -m "chore: update bot state [skip ci]"
          git push || echo "Nothing to push"
